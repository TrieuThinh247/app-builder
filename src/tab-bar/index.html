<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --tb-bg:        #1e1e1e;
      --tb-tab-bg:    #2d2d2d;
      --tb-tab-hover: #323232;
      --tb-border:    #111;
      --tb-text:      #ccc;
      --tb-text-dim:  #999;
      --tb-text-off:  #666;
      --tb-active-bg: #1e1e1e;
      --tb-accent:    #007acc;
      --tb-overlay-bg:#252526;
      --tb-overlay-br:#3c3c3c;
      --tb-btn-bg:    #3c3c3c;
      --tb-btn-hover: #4c4c4c;
      --tb-close-hover:#555;
    }

    [data-theme="light"] {
      --tb-bg:        #f3f4f6;
      --tb-tab-bg:    #e5e7eb;
      --tb-tab-hover: #dde1e7;
      --tb-border:    #d1d5db;
      --tb-text:      #374151;
      --tb-text-dim:  #6b7280;
      --tb-text-off:  #9ca3af;
      --tb-active-bg: #ffffff;
      --tb-accent:    #4f46e5;
      --tb-overlay-bg:#ffffff;
      --tb-overlay-br:#e5e7eb;
      --tb-btn-bg:    #e5e7eb;
      --tb-btn-hover: #d1d5db;
      --tb-close-hover:#d1d5db;
    }

    body {
      height: 36px;
      background: var(--tb-bg);
      display: flex;
      align-items: stretch;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: var(--tb-text);
      transition: background 0.2s, color 0.2s;
    }

    #tabs {
      display: flex;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px 0 10px;
      min-width: 100px;
      max-width: 200px;
      height: 36px;
      background: var(--tb-tab-bg);
      border-right: 1px solid var(--tb-border);
      cursor: pointer;
      color: var(--tb-text-dim);
      flex-shrink: 0;
      position: relative;
    }
    .tab:hover { background: var(--tb-tab-hover); color: var(--tb-text); }
    .tab.active { background: var(--tb-active-bg); color: var(--tb-text); border-top: 2px solid var(--tb-accent); }

    .tab-icon { font-size: 10px; opacity: 0.6; flex-shrink: 0; }
    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab-dirty {
      color: #e5a50a;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }
    .tab-close {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      flex-shrink: 0;
      opacity: 0;
      font-size: 14px;
      color: var(--tb-text-dim);
    }
    .tab:hover .tab-close,
    .tab.active .tab-close { opacity: 1; }
    .tab-close:hover { background: var(--tb-close-hover); color: var(--tb-text); }

    #new-tab-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--tb-text-off);
      font-size: 18px;
      flex-shrink: 0;
    }
    #new-tab-btn:hover { color: var(--tb-text); background: var(--tb-tab-bg); }

    /* Open mode prompt overlay */
    #open-mode-overlay {
      display: none;
      position: fixed;
      top: 36px;
      left: 0;
      right: 0;
      background: var(--tb-overlay-bg);
      border-bottom: 1px solid var(--tb-overlay-br);
      padding: 8px 12px;
      align-items: center;
      gap: 8px;
      z-index: 100;
      font-size: 12px;
      color: var(--tb-text);
    }
    #open-mode-overlay.visible { display: flex; }
    #open-mode-overlay span { flex: 1; }

    .prompt-btn {
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid var(--tb-overlay-br);
      background: var(--tb-btn-bg);
      color: var(--tb-text);
      cursor: pointer;
      font-size: 11px;
    }
    .prompt-btn:hover { background: var(--tb-btn-hover); }
    .prompt-btn.primary { background: var(--tb-accent); border-color: var(--tb-accent); color: #fff; }
    .prompt-btn.primary:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="new-tab-btn" title="+">+</div>

  <div id="open-mode-overlay">
    <span id="open-mode-label"></span>
    <button class="prompt-btn primary" id="btn-new-tab"></button>
    <button class="prompt-btn" id="btn-replace-tab"></button>
    <button class="prompt-btn" id="btn-cancel-open"></button>
  </div>

  <script src="tab-bar.js"></script>
</body>
</html>
