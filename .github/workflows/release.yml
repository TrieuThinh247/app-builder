name: Build & Release

# Trigger khi push tag dạng v1.0.7
on:
  push:
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────
  # Windows build
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      # Checkout extension vào subfolder 'extension/'
      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: leandix-ai/editor-extension
          token: ${{ secrets.GH_TOKEN }}
          path: extension

      # Checkout app-builder vào subfolder 'app-builder/'
      # → cấu trúc: workspace/extension/ và workspace/app-builder/
      # → ../extension từ app-builder/ trỏ đúng vào extension/
      - name: Checkout app-builder
        uses: actions/checkout@v4
        with:
          path: app-builder

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app-builder
        run: npm ci

      - name: Build app
        working-directory: app-builder
        run: npm run build:electron

      - name: Package & publish Windows installer
        working-directory: app-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always

  # ─────────────────────────────────────────
  # macOS build
  # ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: leandix-ai/editor-extension
          token: ${{ secrets.GH_TOKEN }}
          path: extension

      - name: Checkout app-builder
        uses: actions/checkout@v4
        with:
          path: app-builder

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app-builder
        run: npm ci

      - name: Build app
        working-directory: app-builder
        run: npm run build:electron

      - name: Package & publish macOS installer
        working-directory: app-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --publish always

  # ─────────────────────────────────────────
  # Linux build
  # ─────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: leandix-ai/editor-extension
          token: ${{ secrets.GH_TOKEN }}
          path: extension

      - name: Checkout app-builder
        uses: actions/checkout@v4
        with:
          path: app-builder

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app-builder
        run: npm ci

      - name: Build app
        working-directory: app-builder
        run: npm run build:electron

      - name: Package & publish Linux installer
        working-directory: app-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --linux --publish always
