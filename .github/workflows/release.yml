name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────
  # Tạo GitHub Release trước, 3 job build sẽ upload vào đây
  # ─────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: true
          prerelease: false

  # ─────────────────────────────────────────
  # Windows build
  # ─────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout app-builder
        uses: actions/checkout@v4
        with:
          path: app-builder

      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: leandix-ai/editor-extension
          token: ${{ secrets.GH_TOKEN }}
          path: extension

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install app-builder dependencies
        working-directory: app-builder
        run: npm ci

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Build app
        working-directory: app-builder
        run: npm run build:electron

      - name: Package & publish Windows installer
        working-directory: app-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always

  # ─────────────────────────────────────────
  # macOS build
  # ─────────────────────────────────────────
  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout app-builder
        uses: actions/checkout@v4
        with:
          path: app-builder

      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: leandix-ai/editor-extension
          token: ${{ secrets.GH_TOKEN }}
          path: extension

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install app-builder dependencies
        working-directory: app-builder
        run: npm ci

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Build app
        working-directory: app-builder
        run: npm run build:electron

      - name: Package & publish macOS installer
        working-directory: app-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --publish always

  # ─────────────────────────────────────────
  # Linux build
  # ─────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app-builder
        uses: actions/checkout@v4
        with:
          path: app-builder

      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: leandix-ai/editor-extension
          token: ${{ secrets.GH_TOKEN }}
          path: extension

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install app-builder dependencies
        working-directory: app-builder
        run: npm ci

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Build app
        working-directory: app-builder
        run: npm run build:electron

      - name: Package & publish Linux installer
        working-directory: app-builder
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --linux --publish always
