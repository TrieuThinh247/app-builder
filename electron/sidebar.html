<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leandix Sidebar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    .logo {
      padding: 16px 12px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #313244;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
      color: #cba6f7;
      letter-spacing: 0.3px;
    }

    .logo-svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .section {
      padding: 10px 8px 6px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #6c7086;
      padding: 0 4px 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 8px;
      background: none;
      border: none;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 12.5px;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
    }

    .btn:hover {
      background: #313244;
    }

    .btn:active {
      background: #45475a;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .btn .shortcut {
      margin-left: auto;
      font-size: 10px;
      color: #6c7086;
    }

    .divider {
      height: 1px;
      background: #313244;
      margin: 4px 8px;
    }

    .spacer { flex: 1; }

    .footer {
      padding: 10px 12px;
      border-top: 1px solid #313244;
      font-size: 11px;
      color: #6c7086;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="24" height="24" rx="6" fill="#cba6f7" opacity="0.2"/>
      <path d="M6 7h12M6 12h8M6 17h10" stroke="#cba6f7" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Leandix Atlas</span>
  </div>

  <div class="section">
    <div class="section-title">Tệp tin</div>

    <button class="btn" onclick="action('new')">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M9.5 1H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V5.5L9.5 1zM9 2l3 3H9V2zM4 9h3V6h2v3h3v2H9v3H7v-3H4V9z"/>
      </svg>
      Tạo mới
      <span class="shortcut">Ctrl+N</span>
    </button>

    <button class="btn" onclick="action('open')">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.09 1.328L7.5 4H13a1 1 0 0 1 1 1v6.5A1.5 1.5 0 0 1 12.5 13h-10A1.5 1.5 0 0 1 1 11.5v-8z"/>
      </svg>
      Mở file...
      <span class="shortcut">Ctrl+O</span>
    </button>

    <button class="btn" onclick="action('open-pdf')">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M9.5 1H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V5.5L9.5 1zM9 2l3 3H9V2zM5 9h6v1H5V9zm0 2h4v1H5v-1zm0-4h2v1H5V7z"/>
      </svg>
      Mở PDF...
    </button>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Lưu</div>

    <button class="btn" onclick="action('save')">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 1H2zm8.5 1L13 4.5V14H3V2h7.5zM5 10h6v3H5v-3zm1-6h4v3H6V4z"/>
      </svg>
      Lưu
      <span class="shortcut">Ctrl+S</span>
    </button>

    <button class="btn" onclick="action('save-as')">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 1H2zm8.5 1L13 4.5V14H3V2h7.5zM5 10h6v3H5v-3zm1-6h4v3H6V4z"/>
      </svg>
      Lưu dưới dạng...
      <span class="shortcut">Ctrl+Shift+S</span>
    </button>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Xuất</div>

    <button class="btn" onclick="action('export-pdf')">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1v8.5l2.5-2.5 1 1L8 11.5l-3.5-3.5 1-1L8 9.5V1h1H8zm-5 12v1h10v-1H3z"/>
      </svg>
      Xuất PDF...
      <span class="shortcut">Ctrl+P</span>
    </button>
  </div>

  <div class="spacer"></div>

  <div class="footer">Leandix Atlas v1.0.4</div>

  <script>
    function action(name) {
      window.sidebarApi.sendAction(name)
    }
  </script>
</body>
</html>
